<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walidify Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#8b5cf6' } } } }
  </script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="passwordModal" class="fixed inset-0 bg-black flex items-center justify-center z-50">
    <div class="bg-gray-800 p-8 rounded-xl w-80 text-center border border-gray-700">
      <h2 class="text-xl font-bold mb-4">Admin Access</h2>
      <input id="adminPassword" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-600 rounded px-4 py-2 mb-4">
      <button id="verifyBtn" class="w-full bg-primary hover:bg-purple-600 py-2 rounded">Unlock</button>
      <p class="text-xs text-gray-500 mt-3">Demo password: admin2025</p>
    </div>
  </div>

  <div id="adminPanel" class="hidden max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-primary">Walidify Admin</h1>
      <button id="logoutBtn" class="bg-red-600/80 hover:bg-red-600 px-4 py-2 rounded-lg text-sm">Logout</button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
        <p class="text-gray-400 text-sm">Total Orders</p>
        <p id="totalOrders" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
        <p class="text-gray-400 text-sm">Total Products</p>
        <p id="totalProducts" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
        <p class="text-gray-400 text-sm">New Orders</p>
        <p id="newOrders" class="text-2xl font-bold text-yellow-400">0</p>
      </div>
      <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
        <p class="text-gray-400 text-sm">Completed</p>
        <p id="completedOrders" class="text-2xl font-bold text-green-400">0</p>
      </div>
    </div>

    <div class="flex gap-4 border-b border-gray-700 mb-6">
      <button class="tab-btn px-4 py-2 border-b-2 border-purple-400 text-purple-400" data-tab="products">Products</button>
      <button class="tab-btn px-4 py-2 text-gray-400 hover:text-white" data-tab="orders">Orders</button>
      <button class="tab-btn px-4 py-2 text-gray-400 hover:text-white" data-tab="revenue">Revenue</button>
    </div>

    <div id="productsTab" class="tab-content">
      <div class="bg-gray-800 p-6 rounded-xl mb-6 border border-gray-700">
        <h3 class="font-bold mb-4">➕ Add New Product</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <input id="titleEn" placeholder="Title (EN)" class="bg-gray-900 border border-gray-600 rounded px-3 py-2">
          <input id="titleAr" placeholder="Title (AR)" class="bg-gray-900 border border-gray-600 rounded px-3 py-2">
          <input id="titleFr" placeholder="Title (FR)" class="bg-gray-900 border border-gray-600 rounded px-3 py-2">
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <textarea id="descEn" placeholder="Description (EN)" class="bg-gray-900 border border-gray-600 rounded px-3 py-2 h-24 md:col-span-1"></textarea>
          <textarea id="descAr" placeholder="Description (AR)" class="bg-gray-900 border border-gray-600 rounded px-3 py-2 h-24 md:col-span-1"></textarea>
          <textarea id="descFr" placeholder="Description (FR)" class="bg-gray-900 border border-gray-600 rounded px-3 py-2 h-24 md:col-span-1"></textarea>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
          <input id="currentPrice" type="number" step="0.01" placeholder="Current Price" class="bg-gray-900 border border-gray-600 rounded px-3 py-2">
          <input id="oldPrice" type="number" step="0.01" placeholder="Old Price" class="bg-gray-900 border border-gray-600 rounded px-3 py-2">
          <input id="discountPercent" type="number" placeholder="Discount %" readonly class="bg-gray-900 border border-gray-600 rounded px-3 py-2 text-gray-400">
          <select id="category" class="bg-gray-900 border border-gray-600 rounded px-3 py-2">
            <option value="ai">AI Prompts</option><option value="pdf">PDF Books</option>
          </select>
        </div>
        <div class="flex gap-4 mb-4">
          <button id="uploadMainBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">Upload Cover</button>
          <button id="uploadMultiBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">Upload Preview Images</button>
        </div>
        <input id="mainImageUrl" type="hidden">
        <input id="previewUrls" type="hidden">
        <div id="mainPreview" class="mb-4"></div>
        <div id="multiPreview" class="flex gap-2 mb-4 flex-wrap"></div>
        <button id="saveProductBtn" class="bg-primary hover:bg-purple-600 px-6 py-2 rounded font-bold">Save Product</button>
      </div>
      <div id="productsList" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <div id="ordersTab" class="tab-content hidden">
      <div class="flex flex-col md:flex-row gap-4 mb-4">
        <input id="searchOrder" type="text" placeholder="Search by name or phone..." class="flex-1 bg-gray-800 border border-gray-600 rounded px-4 py-2">
        <select id="statusFilter" class="bg-gray-800 border border-gray-600 rounded px-4 py-2">
          <option value="all">All</option><option value="pending">Pending</option><option value="completed">Completed</option>
        </select>
      </div>
      <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
        <table class="w-full text-left">
          <thead class="bg-gray-700 text-gray-300">
            <tr><th class="p-3">Customer</th><th class="p-3">Phone</th><th class="p-3">Wilaya</th><th class="p-3">Total</th><th class="p-3">Status</th><th class="p-3">WhatsApp</th></tr>
          </thead>
          <tbody id="ordersTableBody" class="divide-y divide-gray-700"></tbody>
        </table>
      </div>
    </div>

    <div id="revenueTab" class="tab-content hidden">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700"><p class="text-gray-400 text-sm">Today</p><p id="todayRev" class="text-2xl font-bold text-green-400">$0</p></div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700"><p class="text-gray-400 text-sm">Week</p><p id="weekRev" class="text-2xl font-bold text-blue-400">$0</p></div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700"><p class="text-gray-400 text-sm">Month</p><p id="monthRev" class="text-2xl font-bold text-purple-400">$0</p></div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700"><p class="text-gray-400 text-sm">Year</p><p id="yearRev" class="text-2xl font-bold text-yellow-400">$0</p></div>
      </div>
    </div>
  </div>

  <script type="module" src="admin-script.js"></script>
</body>
</html>
